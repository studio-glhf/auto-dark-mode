<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Auto Dark Mode Switch</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="top-row">
        <div>
          <h1>Auto Dark</h1>
          <p id="host" class="host">Current site</p>
        </div>
        <label class="switch" title="Enable automatic dark mode">
          <input id="global-toggle" type="checkbox" aria-label="Enable automatic dark mode">
          <span class="switch-track"></span>
        </label>
      </header>

      <section class="status-panel" aria-live="polite">
        <div id="status-label" class="status-label">Checking</div>
        <div id="status-detail" class="status-detail">Checking this page.</div>
      </section>

      <section class="mode-group" aria-label="Current site mode">
        <button class="mode-button" type="button" data-rule="auto">Auto</button>
        <button class="mode-button" type="button" data-rule="native">Native</button>
        <button class="mode-button" type="button" data-rule="force">Force</button>
        <button class="mode-button" type="button" data-rule="off">Off</button>
      </section>

      <footer class="footer-row">
        <p id="debugger-note" class="debugger-note">Local only. No browsing data is sent.</p>
        <button id="refresh" class="icon-button" type="button" title="Check again" aria-label="Check again">
          <span aria-hidden="true">↻</span>
        </button>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
